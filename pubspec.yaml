name: speedygrocer
description: AI-Powered Hyperlocal Grocery Delivery Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^16.3.0
  http: ^1.1.2
  intl: ^0.18.1
  fl_chart: ^0.66.2
  lottie: ^3.0.0
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  dio: ^5.4.0
  get_it: ^7.6.7
  equatable: ^2.0.5
  uuid: ^4.3.3
  speech_to_text: ^6.6.2
  firebase_messaging: ^16.2.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/